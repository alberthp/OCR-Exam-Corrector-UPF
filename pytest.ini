[pytest]
markers =
    gui: exercises PySide6 widgets (needs QT_QPA_PLATFORM=offscreen if no display)
    integration: uses real project-root data files; skips itself if they're absent
    slow: takes more than a few seconds (real OCR pipeline runs)
    packaging: drives an already-built frozen .exe; opt-in only, needs --packaged-exe
testpaths = tests
